paths:
  /register:
    post:
      tags:
        - Auth
      summary: Register new user
      description: Create new user and token
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - username
                - email
                - password
              properties:
                username:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                  minLength: 8
                profile_picture:
                  type: string
                  format: binary
                  description: (jpg, jpeg, png, max 10MB).
      responses:
        '201':
          description: User registered successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  token:
                    type: string
                    example: "1|NmY4...token...xyz"
        '422':
          description: Validation error (eg. taken username/email, required field not filled).
        '500':
          description: Unknown error

  /login:
    post:
      tags:
        - Auth
      summary: Login user
      description: Validates credentials and generates new token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: "janos@example.com"
                password:
                  type: string
                  format: password
                  example: "password123"
      responses:
        '200':
          description: Successful login.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/UserWithEmailVerifiedAt'
                  token:
                    type: string
                    example: "2|AbC...token...123"
        '401':
          description: Incorrect email or password / required field not filled.

  /logout:
    post:
      tags:
        - Auth
      summary: Log user out
      description: Revokes all of the tokens of the user
      security:
        - sanctum: []
      responses:
        '200':
          description: Succesful logout
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Logged out successfully!"
        '401':
          description: Unauthenticated

  /email/verification-notification:
    post:
      tags:
        - E-mail verification
      summary: Resend verification email
      description: Sends a new verification link to the logged-in user. Limited to 6 requests per minute.
      security:
        - sanctum: []
      responses:
        '200':
          description: Email sent.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Verification link sent!"

  /email/verify/{id}/{hash}:
    get:
      tags:
        - E-mail verification
      summary: Verify email address
      description: Validates the hash and marks the user's email as verified.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: hash
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successfully verified.
        '302':
          description: Redirect to frontend if already verified.
        '403':
          description: Invalid hash or signature.

  /forgot-password:
    post:
      tags:
        - Password reset
      summary: Request reset link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Link sent.

  reset-password/{token}:
    get:
      tags:
        - Password reset
      summary: Reset password redirect (only acts as a bridge)
      description: |
        This endpoint is called when the user clicks the 'Reset Password' button in their email.
        It extracts the token and redirects the user to the frontend application.
        It is not intended to be called by frontend directly.
      parameters:
        - name: token
          in: path
          required: true
          description: The reset token provided in the email link.
          schema:
            type: string
      responses:
        '302':
          description: Redirects to the frontend password reset page.
          headers:
            Location:
              schema:
                type: string
                example: "http://localhost:3000/reset-password?token=abc123token"

  /reset-password:
    post:
      tags:
        - Password reset
      summary: Reset password
      description: Resets the password using the token sent via email.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, email, password, password_confirmation]
              properties:
                token: { type: string }
                password: { type: string, minLength: 8 }
                password_confirmation: { type: string }
      responses:
        '200':
          description: Password reset successful.


  /users:
